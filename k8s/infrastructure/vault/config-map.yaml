apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: techprocess
data:
  config.hcl: |
    storage "file" {
      path = "/vault/data"
    }
    
    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = true
    }
    
    ui = true
    
    api_addr = "http://vault:8200"
    cluster_addr = "http://vault:8201"
