apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: techprocess
  labels:
    app: vault
spec:
  serviceName: vault
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15.0
          args:
            - server
          ports:
            - containerPort: 8200
              name: http
            - containerPort: 8201
              name: cluster
          env:
            - name: SKIP_SETCAP
              value: "true"
            - name: VAULT_ADDR
              value: "http://0.0.0.0:8200"
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: "root"  # ТОЛЬКО ДЛЯ РАЗРАБОТКИ!
          volumeMounts:
            - name: config
              mountPath: /vault/config
            - name: data
              mountPath: /vault/data
            - name: logs
              mountPath: /vault/logs
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: vault-config
        - name: data
          persistentVolumeClaim:
            claimName: vault-data-pvc
        - name: logs
          emptyDir: {}
