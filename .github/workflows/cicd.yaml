name: Deploy all services

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'k8s/**'

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/api-gateway

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test --no-daemon

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace techprocess --dry-run=client -o yaml | kubectl apply -f -

      - name: Create PostgreSQL secret
        run: |
          kubectl create secret generic postgres-keycloak-secret \
            --namespace techprocess \
            --from-literal=username=${{ secrets.POSTGRES_KEYCLOAK_USER }} \
            --from-literal=password=${{ secrets.POSTGRES_KEYCLOAK_PASS }} \
            --from-literal=db=${{ secrets.POSTGRES_KEYCLOAK_DB }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy PostgreSQL
        run: kubectl apply -f k8s/postgres-keycloak.yaml -n techprocess

      - name: Wait for PostgreSQL
        run: kubectl wait --for=condition=ready pod -l app=postgres-keycloak -n techprocess --timeout=120s

      - name: Create Keycloak secret
        run: |
          kubectl create secret generic keycloak-secret \
            --namespace techprocess \
            --from-literal=admin-password=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Keycloak
        run: kubectl apply -f k8s/keycloak.yaml -n techprocess

      - name: Wait for Keycloak
        run: kubectl wait --for=condition=ready pod -l app=keycloak -n techprocess --timeout=180s

      - name: Create api-gateway secret
        run: |
          kubectl create secret generic api-gateway-secret \
            --namespace techprocess \
            --from-literal=client-secret=${{ secrets.KEYCLOAK_CLIENT_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy api-gateway
        run: |
          kubectl apply -f k8s/api-gateway.yaml -n techprocess
          kubectl set image deployment/api-gateway \
            api-gateway=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            -n techprocess

      - name: Verify deployment
        run: kubectl rollout status deployment/api-gateway -n techprocess --timeout=120s

      - name: Health check
        run: |
          kubectl port-forward service/api-gateway 8083:8083 -n techprocess &
          sleep 10
          curl -f http://localhost:8083/actuator/health || exit 1
